<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>栖心岛 | 沉浸式情绪疗愈空间</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <!-- Iconify -->
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <!-- Howler.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { font-family: 'Inter', sans-serif; overflow: hidden; background: #1a2a2f; height: 100vh; width: 100vw; }
        :root { --mint-light: #cfe9df; --mint-soft: #b6d7c8; --heal-blue: #b8cfd0; --heal-deep: #9bb7b4; --warm-gray: #e2e0d4; --glass-white: rgba(255, 255, 255, 0.2); --glass-border: rgba(255, 255, 255, 0.35); --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.1); --transition-smooth: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .journey-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 30% 20%, #cfe2dc, #9fc1b7, #7ba39b); display: flex; align-items: center; justify-content: center; z-index: 1000; transition: opacity 1.2s ease-out; opacity: 1; }
        .journey-content { text-align: center; color: #2b4b3e; }
        .breathing-ring { width: 180px; height: 180px; margin: 0 auto 2rem; border-radius: 50%; background: rgba(255, 248, 225, 0.4); box-shadow: 0 0 40px rgba(160, 210, 180, 0.8), inset 0 0 20px rgba(255, 255, 210, 0.6); }
        .breath-text { font-size: 1.8rem; font-weight: 400; margin-top: 1.2rem; background: linear-gradient(135deg, #eef9f2, #c8dfd3); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .sub-text { margin-top: 2rem; font-size: 0.9rem; opacity: 0.7; }
        .main-app { width: 100vw; height: 100vh; background: url('https://pixabay.com/get/g7327f3d3c798bb16519a4f5d52c843e53fe43ad712b180551749ccc470755fb31bf5c74ed8026bf41359e5b57c5fdd448018001a402862c0efd0618199381f19117efaff7fbbfdb783c5ac5f0539a58d_1280.jpg?attachment=') center/cover no-repeat fixed; overflow-y: auto; opacity: 0; transition: opacity 1.5s ease; scrollbar-width: none; }
        .main-app::-webkit-scrollbar { display: none; }
        .glass-panel { background: rgba(245, 245, 240, 0.25); backdrop-filter: blur(14px); border-radius: 2rem; border: 1px solid rgba(255, 255, 245, 0.4); box-shadow: var(--shadow-soft); }
        .dual-layout { display: grid; grid-template-columns: 1fr 0.9fr; gap: 1.8rem; padding: 2rem; max-width: 1600px; margin: 0 auto; height: calc(100vh - 2rem); align-items: start; }
        .treehole-area { height: 85vh; display: flex; flex-direction: column; overflow: hidden; padding: 1.2rem 1rem 1rem 1rem; }
        .chat-header { display: flex; justify-content: space-between; align-items: center; padding: 0 0.5rem 0.8rem 0.5rem; border-bottom: 1px solid rgba(255,255,210,0.4); margin-bottom: 0.5rem; }
        .privacy-toggle { display: flex; align-items: center; gap: 0.4rem; background: rgba(0,0,0,0.3); padding: 0.3rem 0.8rem; border-radius: 2rem; cursor: pointer; font-size: 0.75rem; color: #f2f7ed; }
        .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; padding: 0.5rem 0.8rem; scroll-behavior: smooth; }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: rgba(255,255,210,0.2); border-radius: 10px; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--heal-deep); border-radius: 10px; }
        .message { max-width: 85%; padding: 0.8rem 1rem; border-radius: 1.5rem; font-size: 0.95rem; line-height: 1.4; word-break: break-word; animation: fadeInUp 0.25s ease; }
        .user-msg { align-self: flex-end; background: rgba(200, 225, 210, 0.75); backdrop-filter: blur(4px); border-bottom-right-radius: 0.3rem; color: #1f3e36; }
        .bot-msg { align-self: flex-start; background: rgba(250, 250, 245, 0.75); backdrop-filter: blur(4px); border-bottom-left-radius: 0.3rem; color: #2c4d42; }
        .typing-indicator { display: flex; gap: 4px; padding: 0.6rem 1rem; }
        .typing-indicator span { width: 8px; height: 8px; background: #86a89b; border-radius: 50%; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; transform: translateY(0);} 50% { opacity: 1; transform: translateY(-4px);} }
        .chat-input-area { margin-top: 1rem; display: flex; gap: 0.8rem; background: rgba(255,255,245,0.3); backdrop-filter: blur(8px); border-radius: 3rem; padding: 0.3rem 0.3rem 0.3rem 1.2rem; border: 1px solid rgba(255,255,240,0.6); }
        .chat-input-area input { flex: 1; background: transparent; border: none; outline: none; font-size: 0.9rem; color: #1f3e36; font-weight: 500; padding: 0.8rem 0; }
        .chat-input-area input::placeholder { color: #507a6b; }
        .send-btn { background: rgba(190, 215, 195, 0.7); border: none; border-radius: 2rem; padding: 0 1.2rem; font-size: 1.2rem; cursor: pointer; backdrop-filter: blur(4px); transition: all 0.2s; color: #2e5547; }
        .send-btn:hover { background: var(--mint-soft); transform: scale(0.96); }
        .mixer-area { height: 85vh; padding: 1.4rem 1.2rem; display: flex; flex-direction: column; gap: 1.2rem; }
        .mixer-header { display: flex; justify-content: space-between; align-items: center; }
        .deep-mode-btn { background: rgba(100, 150, 140, 0.5); border: none; padding: 0.4rem 1rem; border-radius: 2rem; cursor: pointer; font-size: 0.75rem; color: #f2f7ed; transition: all 0.2s; }
        .deep-mode-btn.active { background: rgba(80, 130, 110, 0.9); box-shadow: 0 0 12px rgba(100, 180, 150, 0.6); }
        .track { background: rgba(40, 55, 50, 0.35); backdrop-filter: blur(6px); border-radius: 1.5rem; padding: 0.8rem 1rem; display: flex; align-items: center; gap: 1rem; border: 1px solid rgba(255,245,200,0.3); }
        .track-icon { font-size: 1.8rem; width: 48px; text-align: center; }
        .track-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .track-name { font-size: 0.85rem; font-weight: 500; color: #f5f7e9; }
        input[type="range"] { width: 100%; height: 4px; -webkit-appearance: none; background: rgba(210, 225, 200, 0.6); border-radius: 5px; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #e7f3e4; border-radius: 50%; cursor: pointer; }
        .volume-value { min-width: 40px; text-align: right; font-size: 0.75rem; color: #ddece4; }
        .garden-modal { position: fixed; bottom: 2rem; right: 2rem; width: 420px; background: rgba(30, 40, 45, 0.95); backdrop-filter: blur(20px); border-radius: 1.5rem; padding: 1.2rem; z-index: 100; transform: translateX(120%); transition: transform 0.5s ease; border: 1px solid rgba(255,255,255,0.2); }
        .garden-modal.show { transform: translateX(0); }
        .garden-chart { height: 220px; width: 100%; }
        .emotion-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.8rem; }
        .tag { background: rgba(184, 216, 208, 0.3); padding: 0.4rem 0.8rem; border-radius: 1rem; font-size: 0.85rem; }
        @media (max-width: 780px) { .dual-layout { grid-template-columns: 1fr; gap: 1rem; padding: 1rem; height: auto; } .treehole-area, .mixer-area { height: 70vh; } .garden-modal { width: 280px; bottom: 1rem; right: 1rem; } }
        /* 登录注册模态框 */
        .auth-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, #cfe2dc, #9fc1b7, #7ba39b);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(8px);
        }
        .auth-glass {
            background: rgba(245, 245, 240, 0.3);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 2rem 2rem 2rem 2rem;
            width: 320px;
            border: 1px solid rgba(255, 255, 245, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        .auth-tabs {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 1.5rem;
        }
        .auth-tab {
            font-size: 1.2rem;
            font-weight: 500;
            color: #eef3e3;
            cursor: pointer;
            padding-bottom: 0.3rem;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
        }
        .auth-tab.active {
            border-bottom-color: #eef3e3;
            color: white;
        }
        .auth-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .auth-panel input {
            background: rgba(255, 255, 245, 0.25);
            border: 1px solid rgba(255, 255, 240, 0.6);
            border-radius: 3rem;
            padding: 0.8rem 1.2rem;
            font-size: 0.9rem;
            color: #1f3e36;
            outline: none;
            font-weight: 500;
        }
        .auth-panel input::placeholder {
            color: #507a6b;
        }
        .auth-btn {
            background: rgba(190, 215, 195, 0.8);
            border: none;
            border-radius: 3rem;
            padding: 0.8rem;
            font-size: 1rem;
            font-weight: 600;
            color: #2e5547;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }
        .auth-btn:hover {
            background: var(--mint-soft);
            transform: scale(0.98);
        }
        .auth-error {
            color: #ffcfb6;
            font-size: 0.75rem;
            margin-top: 0.5rem;
            min-height: 1.5rem;
        }
        /* 用户菜单浮层 */
        .user-menu {
            position: fixed;
            top: 80px;
            left: 20px;
            background: rgba(30, 40, 45, 0.98);
            backdrop-filter: blur(12px);
            border-radius: 1rem;
            padding: 0.8rem 1rem;
            border: 1px solid rgba(255, 255, 245, 0.3);
            z-index: 1000;
            min-width: 150px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .user-menu-content {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #eef3e3;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255,255,210,0.3);
            padding-bottom: 0.5rem;
        }
        .logout-btn {
            background: rgba(190, 215, 195, 0.3);
            border: none;
            border-radius: 2rem;
            padding: 0.4rem 0.8rem;
            color: #ffcfb6;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }
        .logout-btn:hover {
            background: rgba(220, 180, 140, 0.5);
            transform: scale(0.98);
        }
        .recommendation-msg {
            background: rgba(210, 230, 220, 0.85);
            border-left: 4px solid #7ba39b;
            font-style: italic;
        }
        .immersive-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, #e6f7f0, #cfe9df, #b8d7cc);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            font-family: 'Comic Neue', 'Comic Neue', 'Chalkboard SE', 'Comic Sans MS', cursive, sans-serif;
        }
        .immersive-content {
            text-align: center;
            color: #2b5e4a;
            max-width: 90%;
        }
        .immersive-ring {
            width: 220px;
            height: 220px;
            margin: 0 auto 2.5rem;
            border-radius: 50%;
            background: rgba(255, 255, 240, 0.5);
            box-shadow: 0 0 40px rgba(140, 200, 170, 0.6), inset 0 0 20px rgba(255, 255, 210, 0.8);
        }
        .immersive-text {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #2b7a5c, #1f5e46);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: none;
        }
        .immersive-timer {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.8;
            font-weight: 500;
        }
        .immersive-exit {
            background: rgba(255, 255, 245, 0.3);
            border: 1px solid rgba(90, 130, 110, 0.6);
            border-radius: 3rem;
            padding: 0.6rem 1.5rem;
            font-size: 1rem;
            font-weight: bold;
            color: #2b5e4a;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        .immersive-exit:hover {
            background: rgba(255, 255, 245, 0.6);
            transform: scale(0.96);
        }
    </style>
</head>
<body>

<div id="journeyPage" class="journey-page">
    <div class="journey-content">
        <div id="breathingRing" class="breathing-ring"></div>
        <div id="breathText" class="breath-text">吸气 4 秒</div>
        <div class="sub-text">心栖于此 · 呼吸之间</div>
    </div>
</div>

<!-- 登录/注册模态框 -->
<div id="authModal" class="auth-modal" style="display: none;">
    <div class="auth-glass">
        <div class="auth-tabs">
            <span id="loginTab" class="auth-tab active">登录</span>
            <span id="registerTab" class="auth-tab">注册</span>
        </div>
        <div id="loginPanel" class="auth-panel">
            <input type="text" id="loginUsername" placeholder="用户名" autocomplete="off">
            <input type="password" id="loginPassword" placeholder="密码">
            <button id="doLoginBtn" class="auth-btn">进入栖心岛</button>
            <div id="loginError" class="auth-error"></div>
        </div>
        <div id="registerPanel" class="auth-panel" style="display: none;">
            <input type="text" id="regUsername" placeholder="用户名" autocomplete="off">
            <input type="password" id="regPassword" placeholder="密码">
            <button id="doRegisterBtn" class="auth-btn">注册并进入</button>
            <div id="regError" class="auth-error"></div>
        </div>
    </div>
</div>

<div id="mainApp" class="main-app">
    <div class="dual-layout">
        <div class="glass-panel treehole-area">
            <div class="chat-header">
                <div style="display: flex; gap: 8px; align-items: center;">
                    <span class="iconify" data-icon="ri:chat-heart-line" style="font-size: 1.4rem; color: #eef3e3;"></span>
                    <span style="color: #f2f7ed;">树洞回声 · 此刻陪伴</span>
                    <div id="userMenuBtn" class="privacy-toggle" style="margin-left: 8px; padding: 0.2rem 0.6rem; gap: 4px;">
                        <span class="iconify" data-icon="ri:seed-line"></span>
                        <span>🌱 </span>
                    </div>
                </div>
                <div id="privacyToggle" class="privacy-toggle">
                    <span class="iconify" data-icon="ri:eye-off-line"></span>
                    <span>阅后即焚</span>
                </div>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="message bot-msg">🌱 深呼吸，这里很安全。今天有什么想分享的吗？</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="userInput" placeholder="写下你的心事，或只是发呆..." autocomplete="off">
                <button class="send-btn" id="sendBtn">✨</button>
            </div>
        </div>
        <!-- 用户菜单浮层 -->
        <div id="userMenu" class="user-menu" style="display: none;">
            <div class="user-menu-content">
                <div class="user-info">
                    <span class="iconify" data-icon="ri:user-3-line"></span>
                    <span id="displayUsername">未登录</span>
                </div>
                <button id="logoutBtn" class="logout-btn">退出登录</button>
            </div>
        </div>
        <div class="glass-panel mixer-area">
            <div class="mixer-header">
                <div style="display: flex; gap: 8px; align-items: center;">
                    <span class="iconify" data-icon="carbon:music-custom" style="font-size: 1.4rem;"></span>
                    <span style="color: #f2f7ed;">冥想混音台</span>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button id="emotionMusicToggle" class="deep-mode-btn">
                        <span class="iconify" data-icon="mdi:music-note"></span> 情绪配乐
                    </button>
                    <button id="deepModeBtn" class="deep-mode-btn">
                        <span class="iconify" data-icon="mdi:water"></span> 深度沉浸
                    </button>
                </div>
            </div>
            <div id="tracksContainer"></div>
            <div style="margin-top: auto; font-size: 0.7rem; text-align: center; color: rgba(250,245,220,0.7);">
                <span class="iconify" data-icon="carbon:headset"></span> 指尖调音 · 沉浸当下
            </div>
        </div>
    </div>
</div>

<div id="gardenModal" class="garden-modal">
    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
        <span style="color: #eef3ed;">🌸 今日情绪花园</span>
        <span id="closeGarden" style="cursor: pointer; color: #eef3ed;">✕</span>
    </div>
    <div id="gardenChart" class="garden-chart"></div>
    <div id="emotionTags" class="emotion-tags"></div>
</div>

<!-- 深度沉浸模态框 -->
<div id="immersiveModal" class="immersive-modal" style="display: none;">
    <div class="immersive-content">
        <div class="immersive-ring" id="immersiveRing"></div>
        <div class="immersive-text" id="immersiveText">吸气 4 秒</div>
        <div class="immersive-timer" id="immersiveTimer">剩余时间 5:00</div>
        <button id="closeImmersiveBtn" class="immersive-exit">退出沉浸</button>
    </div>
</div>

<script>
    // ==================== 1. 启程页呼吸动画 ====================
    const journeyPage = document.getElementById('journeyPage');
    const mainApp = document.getElementById('mainApp');
    const breathTextSpan = document.getElementById('breathText');
    const ring = document.getElementById('breathingRing');
    let breathCycle = 0;
    let isInhale = true;

    function startBreathing() {
        function nextBreath() {
            if (breathCycle >= 1) {
                journeyPage.style.opacity = '0';
                setTimeout(() => {
                    journeyPage.style.display = 'none';
                    showAuthModal();
                }, 1200);
                return;
            }
            if (isInhale) {
                breathTextSpan.innerText = '吸气 4 秒';
                gsap.to(ring, { scale: 1.4, duration: 4, ease: 'power2.inOut',
                    onComplete: () => { isInhale = false; nextBreath(); }
                });
            } else {
                breathTextSpan.innerText = '呼气 6 秒';
                gsap.to(ring, { scale: 0.8, duration: 6, ease: 'power2.inOut',
                    onComplete: () => { isInhale = true; breathCycle++; nextBreath(); }
                });
            }
        }
        nextBreath();
    }
    startBreathing();
    // ==================== 后端 API 配置 ====================
    const API_BASE = 'http://localhost:3000/api';
    let currentUserId = null;

    // ==================== 2. 音频系统 ====================
    let howlSounds = {};
    let audioStarted = false;
    let deepModeActive = false;
    let emotionMusicEnabled = false; // 情绪配乐开关状态

    const savedEmotionMusic = localStorage.getItem('emotionMusicEnabled');
    if (savedEmotionMusic === 'true') emotionMusicEnabled = true;

    // 根据情绪调整音轨音量
    function adjustMusicByEmotion(emotion) {
        if (!emotionMusicEnabled) return;
        let targetTrackId = 'calm'; // 默认平静
        if (emotion === '愉悦') targetTrackId = 'joy';
        else if (emotion === '忧伤') targetTrackId = 'sadness';
        else if (emotion === '平静') targetTrackId = 'calm';
        else if (['焦虑', '疲惫', '觉察'].includes(emotion)) targetTrackId = 'thought';

        tracks.forEach(track => {
            const newVol = (track.id === targetTrackId) ? 0.7 : 0.1;
            updateVolume(track.id, newVol);
            track.volume = newVol;
        });
        if (!audioStarted) startAudio();
    }

    const tracks = [
        { id: 'joy', name: '喜悦 · 轻快', icon: 'mdi:emoticon-happy-outline', url: 'https://cdn.pixabay.com/download/audio/2026/04/08/audio_e398426c45.mp3?filename=nastelbom-happy-happy-kids-513416.mp3', volume: 0.45 },
        { id: 'sadness', name: '忧伤 · 沉思', icon: 'mdi:emoticon-sad-outline', url: 'https://cdn.pixabay.com/download/audio/2026/02/16/audio_6b2cdc0e5a.mp3?filename=paulyudin-sad-sad-music-485935.mp3', volume: 0.30 },
        { id: 'calm', name: '平静 · 安宁', icon: 'mdi:weather-night', url: 'https://cdn.pixabay.com/download/audio/2024/07/09/audio_17e05e2b0b.mp3?filename=somebody12-quiet-morning-223061.mp3', volume: 0.20 },
        { id: 'thought', name: '思虑 · 专注', icon: 'mdi:brain', url: 'https://cdn.pixabay.com/download/audio/2024/11/26/audio_24ad329374.mp3?filename=lofcosmos-focus-lofi-269097.mp3', volume: 0.35 }
    ];

    function initAudio() {
        tracks.forEach(track => {
            const sound = new Howl({
                src: [track.url],
                loop: true,
                volume: track.volume,
                autoplay: false,
                html5: true
            });
            howlSounds[track.id] = { sound, volume: track.volume };
        });
        loadVolumesFromStorage();
    }

    function startAudio() {
        if (audioStarted) return;
        audioStarted = true;
        Object.values(howlSounds).forEach(item => item.sound.play());
    }

    function updateVolume(trackId, volume) {
        if (howlSounds[trackId]) {
            howlSounds[trackId].sound.volume(volume);
            howlSounds[trackId].volume = volume;
            saveVolumesToStorage();
            const slider = document.querySelector(`.volume-slider[data-track="${trackId}"]`);
            if (slider) slider.value = Math.round(volume * 100);
            const volumeSpan = document.getElementById(`${trackId}Val`);
            if (volumeSpan) volumeSpan.innerText = `${Math.round(volume * 100)}%`;
        }
    }

    function openImmersive() {
        const modal = document.getElementById('immersiveModal');
        modal.style.display = 'flex';
        if (!audioStarted) startAudio();
        tracks.forEach(track => {
            const vol = track.volume * 0.7;
            updateVolume(track.id, vol);
        });
        startImmersiveBreathing();
    }

    function closeImmersive() {
        const modal = document.getElementById('immersiveModal');
        modal.style.display = 'none';
        tracks.forEach(track => {
            const vol = track.volume / 0.7;
            updateVolume(track.id, vol);
        });
    }

    let immersiveInterval = null;
    let immersiveSeconds = 300;

    function startImmersiveBreathing() {
        const ring = document.getElementById('immersiveRing');
        const textSpan = document.getElementById('immersiveText');
        let isInhale = true;
        let cycleCount = 0;
        const totalCycles = 8;

        function nextBreath() {
            if (cycleCount >= totalCycles) {
                cycleCount = 0;
            }
            if (isInhale) {
                textSpan.innerText = '吸气 4 秒';
                gsap.to(ring, { scale: 1.4, duration: 4, ease: 'power2.inOut',
                    onComplete: () => { isInhale = false; nextBreath(); }
                });
            } else {
                textSpan.innerText = '呼气 6 秒';
                gsap.to(ring, { scale: 0.8, duration: 6, ease: 'power2.inOut',
                    onComplete: () => { isInhale = true; cycleCount++; nextBreath(); }
                });
            }
        }
        nextBreath();

        const timerSpan = document.getElementById('immersiveTimer');
        if (immersiveInterval) clearInterval(immersiveInterval);
        immersiveInterval = setInterval(() => {
            if (immersiveSeconds <= 0) {
                clearInterval(immersiveInterval);
                closeImmersive();
            } else {
                immersiveSeconds--;
                const mins = Math.floor(immersiveSeconds / 60);
                const secs = immersiveSeconds % 60;
                timerSpan.innerText = `剩余时间 ${mins}:${secs.toString().padStart(2,'0')}`;
            }
        }, 1000);
    }

    function saveVolumesToStorage() {
        const volumes = {};
        tracks.forEach(t => { volumes[t.id] = howlSounds[t.id]?.volume || t.volume; });
        localStorage.setItem('mixer_volumes', JSON.stringify(volumes));
    }

    function loadVolumesFromStorage() {
        const stored = localStorage.getItem('mixer_volumes');
        if (stored) {
            const volumes = JSON.parse(stored);
            tracks.forEach(t => {
                if (volumes[t.id] !== undefined) {
                    t.volume = volumes[t.id];
                    if (howlSounds[t.id]) {
                        howlSounds[t.id].sound.volume(t.volume);
                        howlSounds[t.id].volume = t.volume;
                    }
                }
            });
        }
        renderMixerUI();
    }

    function renderMixerUI() {
        const container = document.getElementById('tracksContainer');
        if (!container) return;
        container.innerHTML = tracks.map(track => `
            <div class="track" data-track="${track.id}">
                <div class="track-icon"><span class="iconify" data-icon="${track.icon}"></span></div>
                <div class="track-info">
                    <div class="track-name">${track.name}</div>
                    <input type="range" class="volume-slider" min="0" max="100" value="${Math.round(track.volume * 100)}" data-track="${track.id}">
                </div>
                <div class="volume-value" id="${track.id}Val">${Math.round(track.volume * 100)}%</div>
            </div>
        `).join('');
        document.querySelectorAll('.volume-slider').forEach(slider => {
            slider.addEventListener('input', (e) => {
                const trackId = e.target.dataset.track;
                const val = parseInt(e.target.value) / 100;
                const track = tracks.find(t => t.id === trackId);
                if (track) {
                    track.volume = val;
                    updateVolume(trackId, val);
                    const volumeSpan = document.getElementById(`${trackId}Val`);
                    if (volumeSpan) {
                        volumeSpan.innerText = `${Math.round(val * 100)}%`;
                    }
                }
                if (!audioStarted) startAudio();
            });
        });
    }

    // ==================== 3. 对话系统 ====================
    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    let isTyping = false;
    let privacyMode = false;
    let emotionHistory = [];

    // AI 回复库
    const aiResponses = {
        '焦虑': ['我感受到你有些焦虑，这种情绪在提醒你关注自己。要一起做个简短的呼吸练习吗？', '焦虑像一阵风，会来也会走。能具体说说是什么让你担心吗？'],
        '疲惫': ['听起来你今天很疲惫。记得休息不是偷懒，而是为了重新积蓄力量。', '疲惫的时候，允许自己停下来。我这里有一些轻柔的白噪音，也许能帮你放松。'],
        '愉悦': ['真为你感到开心！能分享这份喜悦，我也觉得温暖。', '愉悦的能量会感染周围的人，谢谢你让我也感受到快乐。'],
        '忧伤': ['我在这里陪着你。忧伤也有它的意义，它让我们更懂得珍惜温柔的时刻。', '允许自己难过一会儿，我会一直在这里倾听。'],
        '平静': ['平静是一种珍贵的内在力量。你此刻的觉察很棒。', '就像湖面倒映月光，平静能让我们看清更多东西。']
    };
    const defaultResponses = ['嗯，我听见了。能再多说一点吗？', '谢谢你信任我，把这里当作安全的空间。', '你并不孤单，很多情绪说出来就会轻一些。'];

    function analyzeEmotion(text) {
        // 否定词列表
        const negations = ['不', '没', '无', '别', '莫', '勿', '不是', '没有'];
        // 检查是否包含否定词
        const hasNegation = negations.some(neg => text.includes(neg));

        const keywords = {
            '焦虑': ['焦虑', '担心', '害怕', '紧张', '不安', '压力', '烦', '慌'],
            '疲惫': ['累', '疲惫', '无力', '困', '没精神', '疲劳', '困倦'],
            '愉悦': ['开心', '快乐', '好', '棒', '高兴', '爽', '幸福', '喜悦'],
            '忧伤': ['难过', '伤心', '失落', '哭', '悲伤', '痛苦', '绝望', '委屈', '不开心', '不高兴'],
            '平静': ['平静', '放松', '安宁', '舒服', '宁静', '平和']
        };

        // 优先匹配负面情绪（焦虑、疲惫、忧伤）
        const negativeOrder = ['焦虑', '疲惫', '忧伤'];
        for (let emotion of negativeOrder) {
            if (keywords[emotion].some(kw => text.includes(kw))) {
                // 如果匹配到负面情绪，直接返回（否定词不影响负面）
                return emotion;
            }
        }

        // 匹配积极情绪（愉悦、平静）
        for (let emotion of ['愉悦', '平静']) {
            if (keywords[emotion].some(kw => text.includes(kw))) {
                // 如果包含否定词，则转为负面情绪（例如“不开心” -> 忧伤）
                if (hasNegation) {
                    if (emotion === '愉悦') return '忧伤';
                    if (emotion === '平静') return '焦虑';
                }
                return emotion;
            }
        }

        return '觉察';
    }

    function getAIResponse(emotions) {
        let primary = emotions[0];
        let list = aiResponses[primary] || defaultResponses;
        return list[Math.floor(Math.random() * list.length)];
    }

    function updateEmotionGarden(emotions, userMessage) {
        if (!currentUserId) return;
        emotionHistory.push({
            date: new Date().toLocaleDateString(),
            emotions: emotions,
            message: userMessage.slice(0, 50)
        });
        if (emotionHistory.length > 7) emotionHistory.shift();
        renderGardenChart();
        // 按用户 ID 分别存储
        localStorage.setItem(`emotion_history_${currentUserId}`, JSON.stringify(emotionHistory));
        const modal = document.getElementById('gardenModal');
        modal.classList.add('show');
        setTimeout(() => modal.classList.remove('show'), 5000);
    }

    function renderGardenChart() {
        const chartDom = document.getElementById('gardenChart');
        if (!chartDom) return;
        const emotionCount = {};
        emotionHistory.forEach(record => {
            record.emotions.forEach(em => { emotionCount[em] = (emotionCount[em] || 0) + 1; });
        });
        const data = Object.entries(emotionCount).map(([name, value]) => ({ name, value }));
        const chart = echarts.init(chartDom);
        chart.setOption({
            series: [{
                type: 'pie', radius: ['40%', '70%'], data: data,
                label: { color: '#e8f0f2', fontSize: 14 },
                itemStyle: { borderRadius: 8, borderColor: 'rgba(255,255,255,0.2)', borderWidth: 1 },
                color: ['#b8d8d0', '#c5b9e2', '#e2d9c6', '#9bb7b4', '#d4b8a5']
            }]
        });
        const lastEmotions = emotionHistory.slice(-1)[0]?.emotions || ['平静'];
        document.getElementById('emotionTags').innerHTML = lastEmotions.map(tag => `<span class="tag">#${tag}</span>`).join('');
    }

    function loadEmotionHistory() {
        if (!currentUserId) return;
        const stored = localStorage.getItem(`emotion_history_${currentUserId}`);
        if (stored) {
            try {
                const parsed = JSON.parse(stored);
                emotionHistory = parsed.filter(record => record && Array.isArray(record.emotions));
            } catch(e) {
                emotionHistory = [];
            }
        } else {
            emotionHistory = [];
        }
        renderGardenChart();
    }

    // 流式输出
    function scrollToBottom() { chatMessages.scrollTop = chatMessages.scrollHeight; }
    async function simulateStreaming(text, element) {
        return new Promise((resolve) => {
            let i = 0;
            element.innerHTML = '';
            const interval = setInterval(() => {
                if (i < text.length) {
                    element.innerHTML += text[i];
                    i++;
                    scrollToBottom();
                } else { clearInterval(interval); resolve(); }
            }, 40);
        });
    }
    async function addBotMessage(text) {
        if (isTyping) return;
        isTyping = true;
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message bot-msg';
        msgDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
        chatMessages.appendChild(msgDiv);
        scrollToBottom();
        await new Promise(r => setTimeout(r, 300));
        msgDiv.innerHTML = '';
        await simulateStreaming(text, msgDiv);
        isTyping = false;
        scrollToBottom();

        if (privacyMode) {
            setTimeout(() => {
                if (msgDiv && msgDiv.parentNode) {
                    msgDiv.style.transition = 'opacity 1s ease';
                    msgDiv.style.opacity = '0';
                    setTimeout(() => {
                        if (msgDiv && msgDiv.parentNode) msgDiv.remove();
                    }, 1000);
                }
            }, 5000);
        }
    }
    function addUserMessage(text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message user-msg';
        msgDiv.innerText = text;
        chatMessages.appendChild(msgDiv);
        scrollToBottom();

        if (privacyMode) {
            setTimeout(() => {
                if (msgDiv && msgDiv.parentNode) {
                    msgDiv.style.transition = 'opacity 1s ease';
                    msgDiv.style.opacity = '0';
                    setTimeout(() => {
                        if (msgDiv && msgDiv.parentNode) msgDiv.remove();
                    }, 1000);
                }
            }, 5000);
        }
    }
    async function handleSend() {
        function addRecommendationMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message bot-msg recommendation-msg';
            msgDiv.innerHTML = `💡 小贴士：${text}`;
            chatMessages.appendChild(msgDiv);
            scrollToBottom();
            if (privacyMode) {
                setTimeout(() => {
                    if (msgDiv && msgDiv.parentNode) {
                        msgDiv.style.transition = 'opacity 1s ease';
                        msgDiv.style.opacity = '0';
                        setTimeout(() => msgDiv.remove(), 1000);
                    }
                }, 8000);
            }
        }

        const text = userInput.value.trim();
        if (!text || isTyping) return;
        addUserMessage(text);
        userInput.value = '';
        if (!audioStarted) startAudio();
        try {
            const response = await fetch(`${API_BASE}/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text, userId: currentUserId })
            });
            const data = await response.json();
            await addBotMessage(data.reply);
            if (emotionMusicEnabled) adjustMusicByEmotion(data.emotion);
            updateEmotionGarden([data.emotion], text);

            if (data.recommendation) {
                addRecommendationMessage(data.recommendation);
            }

            updateEmotionGarden([data.emotion], text);
        } catch (err) {
            console.error('请求失败', err);
            await addBotMessage('网络似乎有些问题，请稍后再试～');
        }
    }

    // 显示认证模态框
    function showAuthModal() {
        const authModal = document.getElementById('authModal');
        authModal.style.display = 'flex';
        // 检查 localStorage 是否有登录信息
        const savedUserId = localStorage.getItem('mindhaven_userId');
        const savedUsername = localStorage.getItem('mindhaven_username');
        if (savedUserId && savedUsername) {
            // 自动登录：直接使用保存的 userId
            currentUserId = savedUserId;
            authModal.style.display = 'none';
            startMainApp();
        }
    }

    // 启动主应用
    function startMainApp() {
        mainApp.style.display = '';
        mainApp.style.opacity = '1';
        initAudio();
        loadEmotionHistory();
    }

    // 处理登录
    async function handleLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        const errorDiv = document.getElementById('loginError');
        if (!username || !password) {
            errorDiv.innerText = '请输入用户名和密码';
            return;
        }
        try {
            const res = await fetch(`${API_BASE}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (res.ok) {
                currentUserId = data.userId;
                localStorage.setItem('mindhaven_userId', currentUserId);
                localStorage.setItem('mindhaven_username', username);
                document.getElementById('authModal').style.display = 'none';
                startMainApp();
            } else {
                errorDiv.innerText = data.error || '登录失败';
            }
        } catch (err) {
            errorDiv.innerText = '网络错误，请稍后重试';
        }
    }

    // 处理注册
    async function handleRegister() {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value.trim();
        const errorDiv = document.getElementById('regError');
        if (!username || !password) {
            errorDiv.innerText = '请输入用户名和密码';
            return;
        }
        if (password.length < 3) {
            errorDiv.innerText = '密码至少3个字符';
            return;
        }
        try {
            const res = await fetch(`${API_BASE}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (res.ok) {
                currentUserId = data.userId;
                localStorage.setItem('mindhaven_userId', currentUserId);
                localStorage.setItem('mindhaven_username', username);
                document.getElementById('authModal').style.display = 'none';
                startMainApp();
            } else {
                errorDiv.innerText = data.error || '注册失败';
            }
        } catch (err) {
            errorDiv.innerText = '网络错误，请稍后重试';
        }
    }

    // 切换登录/注册面板
    function switchAuthTab(tab) {
        const loginPanel = document.getElementById('loginPanel');
        const registerPanel = document.getElementById('registerPanel');
        const loginTab = document.getElementById('loginTab');
        const regTab = document.getElementById('registerTab');
        if (tab === 'login') {
            loginPanel.style.display = 'flex';
            registerPanel.style.display = 'none';
            loginTab.classList.add('active');
            regTab.classList.remove('active');
        } else {
            loginPanel.style.display = 'none';
            registerPanel.style.display = 'flex';
            loginTab.classList.remove('active');
            regTab.classList.add('active');
        }
    }

    // 认证相关事件监听
    document.getElementById('loginTab').addEventListener('click', () => switchAuthTab('login'));
    document.getElementById('registerTab').addEventListener('click', () => switchAuthTab('register'));
    document.getElementById('doLoginBtn').addEventListener('click', handleLogin);
    document.getElementById('doRegisterBtn').addEventListener('click', handleRegister);

    const loginPwd = document.getElementById('loginPassword');
    const regPwd = document.getElementById('regPassword');
    if (loginPwd) loginPwd.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
    if (regPwd) regPwd.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleRegister(); });
    // 用户菜单相关
    const userMenuBtn = document.getElementById('userMenuBtn');
    const userMenu = document.getElementById('userMenu');
    const displayUsernameSpan = document.getElementById('displayUsername');
    const logoutBtn = document.getElementById('logoutBtn');

    // 显示/隐藏用户菜单
    userMenuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const isVisible = userMenu.style.display === 'block';
        userMenu.style.display = isVisible ? 'none' : 'block';
        if (!isVisible) {
            // 更新用户名显示
            const username = localStorage.getItem('mindhaven_username') || '未登录';
            displayUsernameSpan.innerText = username;
        }
    });

    // 点击页面其他地方关闭菜单
    document.addEventListener('click', function(e) {
        if (!userMenu.contains(e.target) && e.target !== userMenuBtn) {
            userMenu.style.display = 'none';
        }
    });

    // 退出登录
    logoutBtn.addEventListener('click', () => {
        localStorage.removeItem('mindhaven_userId');
        localStorage.removeItem('mindhaven_username');
        currentUserId = null;
        if (audioStarted) {
            Object.values(howlSounds).forEach(item => item.sound.stop());
            audioStarted = false;
        }
        mainApp.style.opacity = '0';
        setTimeout(() => {
            document.getElementById('authModal').style.display = 'flex';
            userMenu.style.display = 'none';
            const chatMessagesDiv = document.getElementById('chatMessages');
            chatMessagesDiv.innerHTML = '<div class="message bot-msg">🌱 深呼吸，这里很安全。今天有什么想分享的吗？</div>';
        }, 200);
    });

    const emotionMusicToggle = document.getElementById('emotionMusicToggle');
    if (emotionMusicToggle) {
        // 初始化按钮样式
        if (emotionMusicEnabled) {
            emotionMusicToggle.style.background = 'rgba(80, 130, 110, 0.9)';
            emotionMusicToggle.style.boxShadow = '0 0 12px rgba(100, 180, 150, 0.6)';
        }
        emotionMusicToggle.addEventListener('click', () => {
            emotionMusicEnabled = !emotionMusicEnabled;
            localStorage.setItem('emotionMusicEnabled', emotionMusicEnabled);
            if (emotionMusicEnabled) {
                emotionMusicToggle.style.background = 'rgba(80, 130, 110, 0.9)';
                emotionMusicToggle.style.boxShadow = '0 0 12px rgba(100, 180, 150, 0.6)';
            } else {
                emotionMusicToggle.style.background = 'rgba(100, 150, 140, 0.5)';
                emotionMusicToggle.style.boxShadow = 'none';
                // 关闭时恢复用户之前存储的音量设置
                loadVolumesFromStorage();
            }
        });
    }
    document.getElementById('privacyToggle').addEventListener('click', () => {
        privacyMode = !privacyMode;
        const toggle = document.getElementById('privacyToggle');
        toggle.innerHTML = privacyMode ?
            '<span class="iconify" data-icon="ri:eye-fill"></span><span>阅后即焚</span>' :
            '<span class="iconify" data-icon="ri:eye-off-line"></span><span>阅后即焚</span>';
    });
    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    document.getElementById('deepModeBtn').addEventListener('click', openImmersive);
    document.getElementById('closeImmersiveBtn').addEventListener('click', () => {
        clearInterval(immersiveInterval);
        closeImmersive();
    });
    document.getElementById('closeGarden').addEventListener('click', () => {
        document.getElementById('gardenModal').classList.remove('show');
    });

    renderMixerUI();
    loadEmotionHistory();
</script>
</body>
